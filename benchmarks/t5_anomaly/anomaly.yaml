  prompt: 'Analyze the following BTC/USDT 1-hour K-line data (50 candles) and identify
    ALL anomalies.


    ## Anomaly Types to Look For


    1. **missing_value**: A required field (open, high, low, close, volume) is empty
    or missing

    2. **ohlc_logic_error**: OHLC logic violation — high should be >= low, and open/close
    should be within [low, high]

    3. **duplicate_timestamp**: Two consecutive rows share the same timestamp

    4. **price_spike**: A candle''s price (close) deviates dramatically from surrounding
    candles (e.g., 10x drop or spike)

    5. **volume_anomaly**: Volume is negative or clearly invalid


