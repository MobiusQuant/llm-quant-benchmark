    \n- Bearish trend:\n  - RSI > 60 AND MACD_HIST < 0 → SELL (bounce short)\n  -\
    \ RSI < 20 → BUY (oversold bottom)\n  - Otherwise → HOLD\n\n- Sideways:\n  - Close\
