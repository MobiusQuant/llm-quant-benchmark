# Default config: models reachable via OpenRouter (https://openrouter.ai).
# Set your key:  export OPENROUTER_API_KEY=...   (or put it in a .env file)
provider:
  base_url: "https://openrouter.ai/api/v1"
  api_key_env: "OPENROUTER_API_KEY"
  timeout: 300
  max_retries: 2
  temperature: 0.0          # deterministic; set null to omit (some thinking models reject it)
  # max_tokens: 32000       # uncomment for thinking models that otherwise truncate

models:
  # Frontier
  - { id: "openai/gpt-5.5",                  label: "GPT-5.5" }
  - { id: "anthropic/claude-opus-4.8",       label: "Claude Opus 4.8" }
  - { id: "google/gemini-3.1-pro-preview",   label: "Gemini 3.1 Pro" }
  # Anthropic (previous gen)
  - { id: "anthropic/claude-opus-4.6",       label: "Claude Opus 4.6" }
  - { id: "anthropic/claude-sonnet-4.6",     label: "Claude Sonnet 4.6" }
  # Chinese flagships
  - { id: "deepseek/deepseek-v4-pro",        label: "DeepSeek V4 Pro" }
  - { id: "qwen/qwen3.7-max",                label: "Qwen3.7 Max" }
  - { id: "moonshotai/kimi-k2.6",            label: "Kimi K2.6" }
  - { id: "z-ai/glm-5.1",                    label: "GLM 5.1" }
  - { id: "z-ai/glm-5.2",                    label: "GLM 5.2" }   # also see configs/bigmodel-direct.yaml
  - { id: "minimax/minimax-m3",              label: "MiniMax M3" }
  - { id: "xiaomi/mimo-v2.5-pro",            label: "MiMo V2.5 Pro" }

run:
  # t3/t6/t7 (JSON / long-context / constraints) are embedded inside t2/t4/t5.
  dimensions: ["t1", "t2", "t4", "t5"]
  concurrency: 4
  rounds: 3
  output_dir: "results"
